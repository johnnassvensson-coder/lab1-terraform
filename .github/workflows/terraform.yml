name: Terraform CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Uppdaterad till v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3 # Uppdaterad till v3

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2 # Uppdaterad till v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan
